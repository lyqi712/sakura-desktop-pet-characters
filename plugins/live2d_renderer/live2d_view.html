      if (!isFinite(value)) continue;
      _setParamByName(cm, ids, param, value);
      if (owned) SakuraLive2DSceneActions.ownParam(param, true, value);
    }
    _applyRenderGuards(cm, true);
  },
  resetParams: function(params, resetParams) {
    var cm = _getCoreModel();
    if (!cm || typeof cm.setParameterValueByIndex !== 'function') return;
    var ids = _parameterIds(cm);
    params = _sceneActionParams(params);
    resetParams = _sceneActionParams(resetParams);
    var names = Object.keys(params);
    for (var i = 0; i < names.length; i++) {
      var param = names[i];
      var value = Object.prototype.hasOwnProperty.call(resetParams, param) ? Number(resetParams[param]) : 0;
      if (!isFinite(value)) value = 0;
      _setParamByName(cm, ids, param, value);
      SakuraLive2DSceneActions.ownParam(param, false);
    }
    _applyRenderGuards(cm, true);
  },
  clearLayer: function(layerName) {
    var layers = _sceneActionObject(_SCENE_ACTIONS.layers);
    var items = _sceneActionArray(layers[layerName]);
    for (var i = 0; i < items.length; i++) {
      this.resetParams(items[i].params, items[i].resetParams);
    }
    delete this.activeLayers[layerName];
  },
  applyLayer: function(layerName, id) {
    var layers = _sceneActionObject(_SCENE_ACTIONS.layers);
    var items = _sceneActionArray(layers[layerName]);
    var action = _sceneActionFind(items, id);
    if (!action) return false;
    this.clearLayer(layerName);
    this.writeParams(action.params, true);
    this.activeLayers[layerName] = action;
    return true;
  },
  applyTransient: function(id, durationMs) {
    var transients = _sceneActionObject(_SCENE_ACTIONS.transients);
    var action = transients[String(id || '')];
    if (!action) return false;
    var duration = Number(durationMs || action.durationMs || 1600);
    if (!isFinite(duration) || duration <= 0) duration = 1600;
    if (this.transientTimers[id]) clearTimeout(this.transientTimers[id]);
    this.writeParams(action.params, true);
    this.transientTimers[id] = setTimeout(function() {
      SakuraLive2DSceneActions.resetParams(action.params, action.resetParams);
      delete SakuraLive2DSceneActions.transientTimers[id];
    }, duration);
    return true;
  },
  playMotionAction: function(id) {
    var motions = _sceneActionObject(_SCENE_ACTIONS.motions);
    var action = motions[String(id || '')];
    if (!action || !action.motion) return false;
    playMotion(action.motion, !!action.loop);
    return true;
  },
  runAction: function(action, payload) {
    action = _sceneActionObject(action);
    var kind = String(action.kind || '').trim();
    try {
      if (kind === 'layer') return this.applyLayer(action.layer, action.id);
      if (kind === 'transient') return this.applyTransient(action.id, action.durationMs);
      if (kind === 'motion') return this.playMotionAction(action.id);
      if (kind === 'expression') {
        setExpression(action.name || action.id || '', Number(action.weight || 1.0));
        return true;
      }
      if (kind === 'params') {
        this.writeParams(action.params, true);
        var duration = Number(action.durationMs || 0);
        if (isFinite(duration) && duration > 0) {
          setTimeout(function() {
            SakuraLive2DSceneActions.resetParams(action.params, action.resetParams);
          }, duration);
        }
        return true;
      }
    } catch (error) {
      _recordExpressionError('scene-action-' + kind, error);
    }
    return false;
  },
  runActions: function(actions, payload) {
    var list = _sceneActionArray(actions);
    for (var i = 0; i < list.length; i++) this.runAction(list[i], payload || {});
  },
  pickWeighted: function(pool) {
    var items = _sceneActionArray(pool);
    if (!items.length) return null;
    var total = 0;
    for (var i = 0; i < items.length; i++) {
      var weight = Number(items[i].weight || 1);
      if (isFinite(weight) && weight > 0) total += weight;
    }
    if (total <= 0) return items[Math.floor(Math.random() * items.length)];
    var cursor = Math.random() * total;
    for (var j = 0; j < items.length; j++) {
      var itemWeight = Number(items[j].weight || 1);
      if (!isFinite(itemWeight) || itemWeight <= 0) continue;
      cursor -= itemWeight;
      if (cursor <= 0) return items[j];
    }
    return items[items.length - 1];
  },
  runIdleAction: function() {
    if (_SCENE_ACTIONS.enabled === false) return;
    var action = this.pickWeighted(_SCENE_ACTIONS.idlePool);
    if (action) this.runAction(action, {source: 'idle'});
  },
  startIdleTimer: function() {
    if (_SCENE_ACTIONS.enabled === false || this.idleTimer) return;
    var interval = Number(_SCENE_ACTIONS.idleIntervalMs || 18000);
    if (!isFinite(interval) || interval < 3000) interval = 18000;
    this.idleTimer = setInterval(function() {
      _runSceneIdleAction();
    }, interval);
  },
  dispatch: function(eventName, payload) {
    if (_SCENE_ACTIONS.enabled === false) return;
    var events = _sceneActionObject(_SCENE_ACTIONS.events);
    this.runActions(events[String(eventName || '')], payload || {});
  }
};
function _runSceneIdleAction() {
  if (window.SakuraLive2DSceneActions) window.SakuraLive2DSceneActions.runIdleAction();
}
function _installSceneActionEventHandlers() {
  if (window.__sakuraSceneActionHandlersInstalled) return;
  window.__sakuraSceneActionHandlersInstalled = true;
  window.addEventListener('sakura:tts.started', function(event) {
    dispatchLive2DSceneEvent('tts.started', event.detail || {});
  });
  window.addEventListener('sakura:llm.request.started', function(event) {
    dispatchLive2DSceneEvent('llm.request.started', event.detail || {});
  });
  window.addEventListener('sakura:pet.clicked', function(event) {
    dispatchLive2DSceneEvent('pet.clicked', event.detail || {});
  });
  window.SakuraLive2DSceneActions.startIdleTimer();
}
window.dispatchLive2DSceneEvent = function(eventName, payload) {
  if (window.SakuraLive2DSceneActions) {
    window.SakuraLive2DSceneActions.dispatch(eventName, payload || {});
  }
};
window.triggerLive2DSceneAction = function(kind, name) {
  if (!window.SakuraLive2DSceneActions) return false;
  kind = String(kind || '').trim();
  name = name == null ? '' : String(name || '').trim();
  if (kind === 'idle') return window.SakuraLive2DSceneActions.runIdleAction();
  if (kind === 'layer') {
    var sep = name.indexOf(':');
    if (sep <= 0) return false;
    return window.SakuraLive2DSceneActions.applyLayer(name.slice(0, sep), name.slice(sep + 1));
  }
  if (kind === 'motion') return window.SakuraLive2DSceneActions.playMotionAction(name);
  if (kind === 'transient') return window.SakuraLive2DSceneActions.applyTransient(name);
  return false;
};


// ============================================================
//  Liveness Engine v2 — 无摄像头拟真动感
//  用平滑噪声(fBm) + 眼球扫视(saccade) + 自主注意力漂移 +
//  长周期重心转移 替换可预测的纯正弦 idle，模拟真人的随机微动。
// ============================================================
var _speaking = false;
var _thinking = false;
var _mouthOpen = 0;
var _mouthTarget = 0;
var _nextMouthTargetAt = 0;
var _interactionUntil = 0;
var _interactionKind = '';
var _interactionPulse = 0;
var _blinkUntil = 0;
var _nextBlinkAt = Date.now() + 1800 + Math.random() * 1600;
var _doubleBlink = false;
window.setSpeaking = function(v) { _speaking = !!v; if (!v) { _mouthTarget = 0; } };
window.setThinking = function(v) { _thinking = !!v; };
function _clamp01(v) { return Math.max(0, Math.min(1, v)); }
function _easeOut(v) { v = _clamp01(v); return 1 - Math.pow(1 - v, 3); }
function _easeInOut(v) { v = _clamp01(v); return v < 0.5 ? 2*v*v : 1 - Math.pow(-2*v+2, 2)/2; }

// ---- 确定性平滑噪声 (value noise + fBm) ----
// 比纯正弦更自然：人眼无法识别其周期，产生"有机随机"的漂移感。
function _hash1(n) { var s = Math.sin(n) * 43758.5453123; return s - Math.floor(s); }
function _vnoise(x) {
  var i = Math.floor(x), f = x - i;
  var u = f * f * (3 - 2 * f);            // smoothstep 插值
  return (_hash1(i) * (1 - u) + _hash1(i + 1) * u) * 2 - 1;  // 映射到 [-1,1]
}
function _fbm(x) {                          // 3 层倍频叠加
  return _vnoise(x) * 0.6 + _vnoise(x * 2.13 + 11.7) * 0.28 + _vnoise(x * 4.07 + 23.1) * 0.12;
}

// ---- 眼球扫视状态机 (saccade) ----
// 真人眼睛：短暂快速跳到新注视点 → 停留 → 再跳。静止也不"死盯"。
var _sacFromX = 0, _sacFromY = 0, _sacToX = 0, _sacToY = 0;
var _sacStart = 0, _sacDur = 120, _sacHoldUntil = Date.now() + 900;
var _eyeX = 0, _eyeY = 0;
function _scheduleSaccade(now) {
  _sacFromX = _sacToX; _sacFromY = _sacToY;
  // 新注视点：绝大多数看正前方附近，偶尔才瞟向稍远处
  var spread = Math.random() < 0.15 ? 0.65 : 0.28;
  _sacToX = (Math.random() * 2 - 1) * spread;
  _sacToY = (Math.random() * 2 - 1) * spread * 0.6;
  _sacStart = now;
  _sacDur = 90 + Math.random() * 80;                 // 90~170ms 的快速移动
  _sacHoldUntil = now + _sacDur + 1200 + Math.random() * 3200; // 停留 1.2~4.4s
}

// ---- 头部姿态：目标 + 弹簧阻尼 ----
// 真人待机大部分时间几乎不动，偶尔缓慢偏个头再停住。
// 用"离散随机目标 + 弹簧插值"，弹簧天然产生起步慢/到位轻微过冲回弹的自然曲线。
var _poseTX = 0, _poseTY = 0, _poseTZ = 0;         // 当前姿态目标(度)
var _poseX = 0, _poseY = 0, _poseZ = 0;            // 当前姿态值
var _poseVX = 0, _poseVY = 0, _poseVZ = 0;         // 姿态速度(弹簧)
var _nextPoseAt = Date.now() + 2000 + Math.random() * 3000;
function _scheduleNewPose(now) {
  // 70% 概率回到接近中心的自然站姿，30% 才偏头
  if (Math.random() < 0.7) {
    _poseTX = (Math.random() * 2 - 1) * 2.5;
    _poseTY = (Math.random() * 2 - 1) * 1.5;
    _poseTZ = (Math.random() * 2 - 1) * 1.5;
  } else {
    _poseTX = (Math.random() * 2 - 1) * 8.0;         // 偏头
    _poseTY = (Math.random() * 2 - 1) * 4.0;
    _poseTZ = (Math.random() * 2 - 1) * 4.0;
  }
  _nextPoseAt = now + 3000 + Math.random() * 6000;   // 每 3~9 秒换一次姿态
}
// 头发：次级动画弹簧（各段独立，被头部位移驱动 + 持续微摇曳，永不僵死）
var _hairF = 0, _hairS = 0, _hairB = 0;      // 头发当前偏移
var _hairFV = 0, _hairSV = 0, _hairBV = 0;   // 头发速度
var _prevHeadX = 0, _prevHeadZ = 0;
// 头部/身体平滑状态：消除鼠标离散事件的卡顿 + 身体独立拖尾
var _headSmX = 0, _headSmY = 0, _headSmZ = 0;   // 平滑后的头部角度
var _bodyX = 0, _bodyY = 0, _bodyZ = 0;         // 身体拖尾角度（滞后头部）

function triggerInteraction(kind) {
  _interactionKind = String(kind || 'pet_clicked');
  _interactionUntil = Date.now() + 950;
  _interactionPulse = 1.0;
}
window.triggerInteraction = triggerInteraction;
(function waitAndHookRichInteractionTicker() {
  var l2d = window.__sakuraLive2D;
  if (!l2d || !l2d.app || !l2d.model) {
    setTimeout(waitAndHookRichInteractionTicker, 100);
    return;
  }
  _installRenderGuards();
  _installSceneActionEventHandlers();
  // 关掉库内置的 autoFocus：否则 pixi-live2d-display 每帧 updateFocus() 会在
  // 我们设定的 ParamAngle 之上再 addParameterValueById(focus.x*30) 叠加一层鼠标跟随，
  // 与本 ticker 抢头部朝向 → 鼠标跟随卡顿/加倍。头部朝向由本 ticker 独占。
  // autoUpdate 保持开启（物理演算 physics.evaluate 依赖 model.update() 每帧运行）。
  try { if (l2d.model.automator) l2d.model.automator.autoFocus = false; } catch(_) {}
  var _seed = Math.random() * 1000;   // 每次启动相位不同，避免多实例同步
  l2d.app.ticker.add(function() {
    var now = Date.now();
    var t = now / 1000 + _seed;
    var cm = l2d.model.internalModel && l2d.model.internalModel.coreModel;
    if (!cm || typeof cm.setParameterValueByIndex !== 'function') return;
    var ids = _parameterIds(cm);
    function hasP(n) { return ids.indexOf(n) >= 0; }
    function setP(n, v) { try { _setParamByName(cm, ids, n, v); } catch(_) {} }

    // ---- 眨眼：偶发双眨、说话/思考时眨得更勤 ----
    if (now >= _nextBlinkAt && now > _blinkUntil) {
      _blinkUntil = now + 150;
      if (_doubleBlink) {
        _doubleBlink = false;
        _nextBlinkAt = now + 260;          // 连续第二眨
      } else {
        _doubleBlink = Math.random() < 0.18;
        var base = (_speaking || _thinking) ? 1600 : 2600;
        _nextBlinkAt = now + base + Math.random() * 2800;
      }
    }
    var blinkValue = 1.0;
    if (now < _blinkUntil) {
      var blinkPhase = (now - (_blinkUntil - 150)) / 150;
      blinkValue = 1.0 - Math.sin(_clamp01(blinkPhase) * Math.PI);
    }

    // ---- 交互脉冲 ----
    var interaction = 0;
    if (now < _interactionUntil) {
      interaction = _easeOut((_interactionUntil - now) / 950);
      _interactionPulse = interaction;
    } else {
      _interactionPulse *= 0.86;
      interaction = _interactionPulse;
    }

    // ---- 鼠标视线权重：鼠标在动时以鼠标为主，否则自主漂移接管 ----
    var gazeX = l2d.curX || 0;
    var gazeY = l2d.curY || 0;
    var gazeMag = Math.min(1, Math.sqrt(gazeX*gazeX + gazeY*gazeY) * 1.4);

    // ---- 眼球：只跟随鼠标，无鼠标时归中静止（不再自主扫视/眼颤）----
    var eyeTargetX = gazeX * 0.9 * gazeMag;
    var eyeTargetY = -gazeY * 0.75 * gazeMag;
    _eyeX += (eyeTargetX - _eyeX) * 0.30;
    _eyeY += (eyeTargetY - _eyeY) * 0.30;

    // ---- 头部：只跟随鼠标。无鼠标时目标归零 → 安静静止（不再自主偏头晃动）----
    var headTX = gazeX * 30 * gazeMag;
    var headTY = -gazeY * 24 * gazeMag;
    var headTZ = (_thinking ? Math.sin(t * 1.6) * 2.0 : 0);
    // 平滑跟随：鼠标活跃时跟手，静止时缓缓回正
    var followK = 0.10 + gazeMag * 0.22;
    _headSmX += (headTX - _headSmX) * followK;
    _headSmY += (headTY - _headSmY) * followK;
    _headSmZ += (headTZ - _headSmZ) * followK;
    var headX = _headSmX, headY = _headSmY, headZ = _headSmZ;

    // 身体：只被动跟随头部（轻微），不做任何自主重心摆动。
    // 注意 ParamBodyAngleY 被物理引擎占用(IN ParamAngleY)，此处不写，交给物理。
    _bodyX += (headX * 0.4 - _bodyX) * 0.04;
    _bodyZ += (headZ * 0.35 - _bodyZ) * 0.04;

    // 呼吸：唯一持续的动作，缓慢起伏（幅度收小，避免看起来在晃）
    var breathRate = _speaking ? 1.9 : 1.4;
    setP('ParamBreath', (Math.sin(t * breathRate) * 0.35 + 0.5));
    setP('ParamAngleX', headX + interaction * 8.0);
    setP('ParamAngleY', headY - interaction * 4.0);
    setP('ParamAngleZ', headZ - interaction * 5.0);
    setP('ParamBodyAngleX', _bodyX + interaction * 4.0);
    setP('ParamBodyAngleZ', _bodyZ - interaction * 3.0);
    setP('ParamEyeBallX', _eyeX + interaction * 0.12);
    setP('ParamEyeBallY', _eyeY - interaction * 0.08);
    setP('ParamEyeLOpen', blinkValue);
    setP('ParamEyeROpen', blinkValue);

    // ---- 头发：完全交给 Cubism 物理引擎(physics3.json) ----
    // ATRI 头发的真实摆动由物理演算根据 ParamAngleX/Y/Z 自动算出(输出Param2~30骨节)。
    // 手动写 ParamHairFront/Side/Back 会盖在物理之上产生僵硬的整片平移(不像头发)，故一律不碰。
    if (hasP('ParamCheek')) setP('ParamCheek', interaction * 0.75);

    if (_speaking) {
      if (now >= _nextMouthTargetAt) {
        _mouthTarget = 0.10 + Math.random() * 0.34;
        _nextMouthTargetAt = now + 300 + Math.random() * 380;
      }
      _mouthOpen += (_mouthTarget - _mouthOpen) * 0.09;
    } else {
      _mouthOpen *= 0.78;
    }
    setP('ParamMouthOpenY', Math.max(_mouthOpen, interaction * 0.08));
    // 维持 scene_actions 拥有的参数(换装/道具)，防止被渲染管线复位。
    for (var _ownedKey in _OWNED_PARAM_VALUES) {
      if (Object.prototype.hasOwnProperty.call(_OWNED_PARAM_VALUES, _ownedKey)) {
        setP(_ownedKey, _OWNED_PARAM_VALUES[_ownedKey]);
      }
    }
    _applyRenderGuards(cm);
  });
})();
</script>
